<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>

    <style>
        body {
            font-family: serif;
            line-height: 1.6;
            color: #000;

            /* FULL BACKGROUND */
            background-image: url("Gojo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
            margin: 0;

            /* CENTER CONTENT */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-box {
            background-color: rgba(255, 255, 255, 0.6);
            width: 600px;              /* BIGGER WIDTH */
            max-width: 90%;
            padding: 30px;             /* BIGGER PADDING */
            border: 3px solid #000;
            box-align: center;
            
        }

        .profile-img {
            width: 180px;              /* BIGGER IMAGE */
            height: 180px;
            object-fit: cover;
            border: 3px solid #000;
            margin-bottom: 20px;
        }

        .name {
            font-size: 32px;           /* BIGGER TEXT */
            font-weight: bold;
            margin: 10px 0;
        }

        .course-section {
            font-size: 22px;
            margin: 5px 0;
        }

        hr {
            border: 0;
            border-top: 2px solid #000;
            margin: 25px 0;
        }

        .about-me-title {
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .about-me-text {
            font-size: 20px;
            text-align: justify;
        }
    </style>
</head>

<body>

    <div class="profile-box">

        <img src="odang.jpeg" alt="Profile Picture" class="profile-img">

        <div class="info-section">
            <div class="name">NAME: Mark Anthony Odang</div>
            <div class="course-section">COURSE: Computer Science</div>
            <div class="course-section">SECTION: CS1A</div>
        </div>

        <hr>

        <div class="about-me-title">About Me</div>
        <div class="about-me-text">
            I love learning new things as a student and I am responsible and hardworking.
        </div>

    </div>

</body>
</html>
