<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>

    <style>
        body {
            font-family: serif;
            line-height: 1.6;
            color: #000;

            /* BACKGROUND IMAGE */
            background-image: url("Gojo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
margin: 0;
        }

        .profile-box {
            background-color: rgba(255, 255, 255, 0.9);
            width: 500px;
            max-width: 90%;
            padding: 20px;
            border: 2px solid #000;
            
            
        }
        


        .profile-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 2px solid #000;
            margin-bottom: 15px;
        }

        .name {
            font-size: 26px;
            font-weight: bold;
            margin: 5px 0;
        }

        .course-section {
            font-size: 18px;
            margin: 3px 0;
        }

        hr {
            border: 0;
            border-top: 1px solid #000;
            margin: 15px 0;
        }

        .about-me-title {
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .about-me-text {
            font-size: 16px;
            text-align: justify;
        }
    </style>
</head>

<body>

    <div class="profile-box">

        <img src="odang.jpeg" alt="Profile Picture" class="profile-img">

        <div class="info-section">
            <div class="name">NAME: Mark Anthony Odang</div>
            <div class="course-section">COURSE: Computer Science</div>
            <div class="course-section">SECTION: CS1A</div>
        </div>

        <hr>

        <div class="about-me-title">About Me</div>
        <div class="about-me-text">
            I love learning new things as a student and I am responsible and hardworking.
        </div>

    </div>

</body>
</html>
